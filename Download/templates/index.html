<!DOCTYPE html>
<html>
<head>
<title>Credit Card Approval Prediction</title>
<link rel="stylesheet" href="{{ url_for('static',filename='style.css') }}">
</head>

<body>

<div class="container">

<h2>Credit Card Approval Prediction</h2>

<form action="/predict" method="POST">

<label>Age</label>
<input type="number" name="Age" required>

<label>Annual Income</label>
<input type="number" name="Income" required>

<label>Credit Score</label>
<input type="number" name="CreditScore" required>

<label>Employment Years</label>
<input type="number" name="EmploymentYears" required>

<label>Existing Loans</label>
<input type="number" name="Loans" required>

<input type="submit" value="Predict">

</form>

</div>

</body>
</html>
